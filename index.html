<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Number Counter</title>


  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #6079ea 0%, #0fd8ad 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: #333;
    }

    /* Header */
    header {
      background-color: rgba(0, 0, 0, 0.9);
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }

    header h1 {
      color: #8c28ff;
      font-size: 40px;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: bold;
    }

    /* Main */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 50px 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
      max-width: 500px;
      width: 100%;
    }

    .project-title {
      font-size: 40px;
      color: #667eea;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .subtitle {
      color: #666;
      margin-bottom: 40px;
      font-size: 16px;
    }

    /* Counter */
    .counter-section {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 30px;
      border-radius: 15px;
      margin: 30px 0;
    }

    #CounterDisplay {
      font-size: 64px;
      color: white;
      font-weight: bold;
      margin: 0;
    }

    .counter-label {
      color: rgba(255, 255, 255, 0.9);
      font-size: 14px;
      margin-top: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* Buttons */
    .button-group {
      display: flex;
      gap: 15px;
      margin: 30px 0;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      padding: 15px 30px;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #IncrementBtn {
      background-color: #4CAF50;
      color: white;
    }


    #DecrementBtn {
      background-color: #f44336;
      color: white;
    }


    /* Features */
    .features {
      background-color: #f5f5f5;
      padding: 25px;
      border-radius: 10px;
      margin: 30px 0;
      text-align: left;
    }

    .features h3 {
      color: black;
      margin-bottom: 15px;
      text-align: center;
      font-size: 1.3rem;
    }

    .features ul {
      list-style: none;
    }

    .features li {
      padding: 10px 0;
      display: flex;
      align-items: center;
      color: #333;
      font-size: 15px;
    }

    .features li:before {
      content: "✓";
      color: #4CAF50;
      font-weight: bold;
      margin-right: 12px;
      font-size: 19px;
    }

    /* Footer */
    footer {
      background-color: rgba(0, 0, 0, 0.9);
      padding: 20px;
      text-align: center;
      color: #667eea;
      font-size: 14px;
      letter-spacing: 2px;
      margin-top: auto;
    }

    footer p {
      margin: 0;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 29px;
      }

      .container {
        padding: 30px 20px;
      }

      .project-title {
        font-size: 29px;
      }

      #CounterDisplay {
        font-size: 40px;
      }

      button {
        padding: 12px 20px;
        font-size: 14px;
      }
    }
  </style>
</head>

<body>
  <!-- Header - site title -->
  <header>
    <h1>JavaScript</h1>
  </header>

  <main>
    <div class="container">
      <h2 class="project-title">Number Counter</h2>
      <p class="subtitle">A simple and interactive counter application</p>

      <!-- Counter - shows current number -->
      <!-- #CounterDisplay updated by script -->
      <div class="counter-section">
        <div id="CounterDisplay">0</div>
        <div class="counter-label">Current Count</div>
      </div>

      <!-- Buttons - click to change count -->
      <div class="button-group">
        <button id="IncrementBtn">+ Increment</button>
        <button id="DecrementBtn">- Decrement</button>
      </div>

      <!-- Features: static list describing app features -->
      <div class="features">
        <h3>✨ Features</h3>
        <ul>
          <li>Increment counter with click</li>
          <li>Decrement counter with click</li>
          <li>Real-time count display</li>
          <li>Responsive design</li>

        </ul>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <p>© 2026 JAVASCRIPT | Number Counter Application</p>
  </footer>

  <script src="./js.js"></script>
</body>

</html>
